name: "🐞 Report a bug"
description: "Ads showing, black screen, or other misbehavior"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your report! Please check first:
        **Reload the extension (↺) and reload the tab (F5)** — Twitch changes
        its tech often, and a reload fixes many things.
  - type: dropdown
    id: site
    attributes:
      label: Where does the problem occur?
      options:
        - Twitch
        - YouTube
        - Other website (cosmetic/network)
        - Popup / settings
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension version
      description: "See chrome://extensions/ or the popup."
      placeholder: "2.4.15"
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Brave
        - Opera
        - Firefox
        - Other (specify in text)
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happens?
      description: What did you expect, and what happened instead?
      placeholder: "On stream X a 30s ad plays instead of a quality drop …"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open stream X
        2. Wait for an ad
        3. …
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console output (optional)
      description: "DevTools (F12) → Console. Paste relevant errors/logs here."
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checked beforehand
      options:
        - label: I'm using the latest version.
          required: true
        - label: I reloaded the extension (↺) and reloaded the tab (F5).
          required: true
        - label: A brief quality drop during Twitch ads is expected (not a bug).
          required: true
